name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # buildQuestions.js has no external dependencies, so no install is needed.
      - name: Build static question dataset
        run: node scripts/buildQuestions.js

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages with the GitHub Actions source on first run,
          # so no manual Settings -> Pages step is required.
          enablement: true

      - name: Upload site (public/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
